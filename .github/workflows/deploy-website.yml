name: Deploy website to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      # Nuxt site and its local plugin dependency
      - 'demos/vue/**'
      - 'src/**'
      # Workspace install / build inputs used by the deploy job
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/prepare-cloudflare-deploy.mjs'
      # Always re-run when the workflow itself changes
      - '.github/workflows/deploy-website.yml'

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build website
        run: pnpm --filter useclassy-vue run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config demos/vue/.output/server/wrangler.json
